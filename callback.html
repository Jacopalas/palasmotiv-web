<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication — Palasmotiv</title>
    <style>
        :root { --primary: #6C63FF; --bg: #FAFAFA; --text: #1A1A2E; --text-light: #555; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 3rem;
        }
        .checkmark {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        .checkmark svg { width: 32px; height: 32px; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: var(--text-light); font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1>Authentication Completed</h1>
        <p>You can close this window and return to Palasmotiv.</p>
    </div>
</body>
</html>
